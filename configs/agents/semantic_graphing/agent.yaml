agent_name: modality_aware_ild_semantic_graph_agent
version: 0.1.0
default_model_env: CHATANYWHERE_MODEL
default_model: gpt-5.4-mini
base_url_env: CHATANYWHERE_BASE_URL
api_key_env: CHATANYWHERE_API_KEY
temperature: 0.0
max_tokens: 6000
strict_json: true
classification_prompt: src/prompts/semantic_graphing/document_classification.md
graph_unit_prompt: src/prompts/semantic_graphing/graph_unit_extraction.md
graph_unit_max_workers: 5
frame_triage_prompt: src/prompts/semantic_graphing/frame_triage.md
frame_triage_max_workers: 5
slot_filling_prompt: src/prompts/semantic_graphing/frame_slot_filling.md
slot_filling_max_workers: 5
