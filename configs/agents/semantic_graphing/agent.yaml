provider: chatanywhere
# model: deepseek-v4-pro
# base_url: https://api.deepseek.com
# api_key_env: DEEPSEEK_API_KEY
model: gpt-5.5
base_url: https://api.chatanywhere.tech/v1
api_key_env: CHATANYWHERE_API_KEY
reasoning_effort: low
timeout_seconds: 300
temperature: 0.0
max_concurrency: 6
max_attempts: 2
retry_backoff_seconds: 2
classification_max_attempts: 2
graph_unit_max_attempts: 2
primary_frame_max_attempts: 2
clinical_proposition_max_attempts: 2
max_tokens: 16000
classification_max_tokens: 8000
graph_unit_max_tokens: 12000
primary_frame_max_tokens: 2000
clinical_proposition_max_tokens: 16000
# Keep disabled until chunked vs whole-unit extraction passes a quality benchmark.
clinical_proposition_enable_chunking: false
clinical_proposition_max_chunk_chars: 300
classification_prompt: src/prompts/semantic_graphing/document_classification.md
graph_unit_prompt: src/prompts/semantic_graphing/graph_unit_extraction.md
primary_frame_prompt: src/prompts/semantic_graphing/primary_frame_selection.md
clinical_proposition_prompt: src/prompts/semantic_graphing/clinical_proposition_extraction.md
